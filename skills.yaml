# skills.yaml — Which packs to deploy to coding assistants
#
# Only uncommented packs under `active:` get symlinked by sync-deploy.sh.
# Comment out to deactivate; uncomment to re-enable.
#
# Usage:
#   ./sync-deploy.sh              — symlink active skills to all agents
#   ./sync-deploy.sh --profile security  — include a profile's skills
#   ./sync-deploy.sh --clean      — wipe + rebuild all symlinks
#
# Agents read skills via symlinks that point to PAI/Packs/X/src/.
# Edits in-session write through to source (git tracked).

