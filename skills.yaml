# skills.yaml — Which packs to deploy to coding assistants
#
# Only packs listed under `active:` are deployed by sync-deploy.sh.
# All others remain in the repo but aren't copied to agent skill dirs.
#
# Usage:
#   ./sync-deploy.sh              — deploy active skills
#   ./sync-deploy.sh --profile security  — add a profile's skills temporarily
#
# Pi also reads from PAI/Packs directly via customDirectories.
# To exclude packs from pi's recursive scan, add them to Packs/.ignore

